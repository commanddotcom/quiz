version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./app.js:/usr/share/nginx/html/app.js
      - ./tests.json:/usr/share/nginx/html/tests.json
      - ./img:/usr/share/nginx/html/img
    restart: unless-stopped
    container_name: test-app
