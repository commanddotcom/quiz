# Конфігурація для тест-додатку
# Цей файл треба скопіювати в /var/www/moblik/docker/nginx/conf.d/test-app.conf

server {
    listen 80;
    server_name your-test-subdomain.com;  # ЗАМІНІТЬ на ваш субдомен
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name your-test-subdomain.com;  # ЗАМІНІТЬ на ваш субдомен
    
    ssl_certificate /etc/nginx/ssl/test/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/test/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    error_log  /var/log/nginx/test_error.log;
    access_log /var/log/nginx/test_access.log;
    
    location / {
        resolver 127.0.0.11 valid=30s;
        set $upstream 172.17.0.1:8081;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
