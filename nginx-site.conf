# Конфігурація для quiz додатку
# Після генерації SSL сертифікатів закоментуйте HTTP блок і розкоментуйте HTTPS блок

# HTTP (для початку)
server {
    listen 80;
    server_name your-test-subdomain.com;
    
    error_log  /var/log/nginx/quiz_error.log;
    access_log /var/log/nginx/quiz_access.log;
    
    location / {
        resolver 127.0.0.11 valid=30s;
        set $upstream 172.17.0.1:8081;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

